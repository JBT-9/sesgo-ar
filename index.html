<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sesgo AR</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0efe9; color: #1a1a1a; }

.header { background: #fff; border-bottom: 1px solid #e0ddd5; padding: 0; }
.header-inner { max-width: 980px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; }
.logo { font-size: 20px; font-weight: 800; padding: 1rem 0; margin-right: 2rem; letter-spacing: -1px; }
.nav { display: flex; }
.nav-btn { font-size: 14px; padding: 1.1rem 1.2rem; border: none; background: none; cursor: pointer; color: #666; border-bottom: 3px solid transparent; transition: all 0.15s; font-weight: 500; }
.nav-btn:hover { color: #1a1a1a; }
.nav-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
.header-right { margin-left: auto; padding: 0.6rem 0; }
.search-wrap { position: relative; }
.search-input { font-size: 14px; padding: 8px 16px 8px 36px; border: 1.5px solid #ddd; border-radius: 20px; background: #f0efe9; width: 240px; outline: none; transition: all 0.15s; }
.search-input:focus { background: #fff; border-color: #aaa; width: 300px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; pointer-events: none; }
.search-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1px solid #e0ddd5; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 100; max-height: 320px; overflow-y: auto; display: none; }
.search-dropdown.visible { display: block; }
.search-item { padding: 11px 16px; cursor: pointer; border-bottom: 1px solid #f0ede6; }
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: #f5f4f0; }
.search-item-title { font-size: 13px; color: #1a1a1a; line-height: 1.3; }
.search-item-meta { font-size: 11px; color: #aaa; margin-top: 3px; }
.search-empty { padding: 16px; font-size: 13px; color: #aaa; text-align: center; }

.container { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem; }
.page { display: none; }
.page.active { display: block; }

.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 1.25rem; }

.stats { display: flex; gap: 12px; margin-bottom: 2rem; }
.stat-card { background: #fff; border: 1px solid #e0ddd5; border-radius: 12px; padding: 1rem 1.25rem; flex: 1; }
.stat-card .num { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
.stat-card .lbl { font-size: 12px; color: #888; margin-top: 3px; }

.cards-grid { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }

.story-card { background: #fff; border: 1px solid #e0ddd5; border-radius: 14px; overflow: hidden; transition: box-shadow 0.15s; }
.story-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
.story-card.hidden { display: none; }

.framing-grid { display: grid; grid-template-columns: 1fr 1fr; }
.framing-box { overflow: hidden; }
.framing-box + .framing-box { border-left: 1px solid #f0ede6; }

.framing-img { width: 100%; height: 160px; object-fit: cover; display: block; }
.framing-img-placeholder { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #f5f4f0; }

.framing-body { padding: 14px 16px 16px; }
.framing-medio { font-size: 11px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.3px; }
.framing-title { font-size: 14px; line-height: 1.45; color: #1a1a1a; margin-bottom: 8px; font-weight: 500; }
.framing-link { font-size: 11px; color: #888; text-decoration: none; }
.framing-link:hover { color: #1a1a1a; text-decoration: underline; }

.card-footer { padding: 10px 16px; border-top: 1px solid #f0ede6; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.chip { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1.5px solid #e8e6e0; background: #faf9f6; color: #555; text-decoration: none; font-weight: 500; transition: all 0.1s; }
a.chip:hover { background: #f0ede6; color: #1a1a1a; border-color: #ccc; }
.chip-ausente { color: #999; border-style: dashed; font-weight: 400; font-style: italic; }

.single-card { background: #fff; border: 1px solid #e0ddd5; border-radius: 10px; padding: 14px 16px; transition: box-shadow 0.15s; }
.single-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.single-title { font-size: 15px; line-height: 1.4; color: #1a1a1a; margin-bottom: 8px; font-weight: 500; }
.single-meta { font-size: 12px; color: #aaa; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.single-link { font-size: 12px; color: #888; text-decoration: none; margin-left: auto; }
.single-link:hover { text-decoration: underline; color: #1a1a1a; }

.filters { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.filter-btn { font-size: 13px; padding: 6px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #555; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.filter-btn:hover { border-color: #aaa; color: #1a1a1a; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.no-results { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
.section-header { display: flex; align-items: center; gap: 12px; margin: 2rem 0 1rem; }
.section-header:first-child { margin-top: 0; }
.section-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #888; white-space: nowrap; }
.section-line { flex: 1; height: 1px; background: #e0ddd5; }

.expand-btn { font-size: 12px; color: #bbb; background: none; border: none; cursor: pointer; padding: 0; margin-left: auto; font-weight: 500; }
.expand-btn:hover { color: #666; }
.all-titles { display: none; border-top: 1px solid #f0ede6; padding: 12px 16px; }
.all-titles.open { display: block; }
.title-row { display: flex; align-items: baseline; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f8f6f2; }
.title-row:last-child { border-bottom: none; }
.title-medio { font-size: 11px; font-weight: 700; min-width: 100px; flex-shrink: 0; }
.title-text { font-size: 13px; color: #1a1a1a; line-height: 1.4; text-decoration: none; }
.title-text:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">Sesgo AR</div>
    <nav class="nav">
      <button class="nav-btn active" onclick="mostrarPagina('portada', this)">Portada</button>
      <button class="nav-btn" onclick="mostrarPagina('todas', this)">Todas las noticias</button>
    </nav>
    <div class="header-right">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Buscar noticia..." id="search-input" autocomplete="off">
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
    </div>
  </div>
</div>

<div class="container">

  <div class="page active" id="page-portada">
    <div class="stats" id="stats-bar"></div>
    <div class="section-title">Noticias más relevantes</div>
    <div class="cards-grid" id="cards-portada"></div>
  </div>

  <div class="page" id="page-todas">
    <div class="filters">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todas</button>
      <button class="filter-btn" onclick="filtrar('multi', this)">Varios medios</button>
      <button class="filter-btn" onclick="filtrar('ausente', this)">Con ausencias</button>
    </div>
    <div class="cards-grid" id="cards-todas"></div>
    <div class="no-results hidden" id="no-results">No hay noticias para este filtro.</div>
  </div>

</div>

<script>
// Colores de marca por medio
const MEDIO_COLOR = {
  "Infobae":          "#FF6900",
  "La Nación":        "#003087",
  "Clarín":           "#C8102E",
  "Perfil":           "#1a1a1a",
  "Ámbito":           "#006633",
  "El Cronista":      "#004B87",
  "Página 12":        "#E30613",
  "El Destape":       "#7B2D8B",
  "Tiempo Argentino": "#0057A8",
};

const MEDIO_TENDENCIA = {
  "Infobae": "L", "La Nación": "L",
  "Clarín": "C", "Perfil": "C", "Ámbito": "C", "El Cronista": "C",
  "Página 12": "K", "El Destape": "K", "Tiempo Argentino": "K",
};

let todosGrupos = [];

function relevancia(g) {
  const medios = g.medios || [];
  const blind = g.blind_spot || [];
  const tend = g.tendencias_cubren || [];
  let score = medios.length * 2 + blind.length * 3;
  if (tend.includes("K") && tend.includes("L")) score += 5;
  if (tend.includes("K") && tend.includes("C")) score += 2;
  if (tend.includes("L") && tend.includes("C")) score += 2;
  return score;
}

function medioColor(nombre) {
  return MEDIO_COLOR[nombre] || "#888";
}

function framingBox(art) {
  const imgSrc = art.imagen ? `https://images.weserv.nl/?url=${encodeURIComponent(art.imagen)}&w=400&h=200&fit=cover` : "";
  const img = imgSrc
    ? `<img class="framing-img" src="${imgSrc}" alt="" onerror="this.style.display='none'">`
    : `<div class="framing-img-placeholder">📰</div>`;
  const link = art.link ? `<a href="${art.link}" target="_blank" class="framing-link">Leer en ${art.medio} →</a>` : "";
  const color = medioColor(art.medio);
  return `
    <div class="framing-box">
      ${img}
      <div class="framing-body">
        <div class="framing-medio" style="color:${color}">${art.medio}</div>
        <div class="framing-title">${art.titulo}</div>
        ${link}
      </div>
    </div>`;
}

function renderCard(g) {
  const arts = g.articulos || [];
  const blind = g.blind_spot || [];
  const medios = g.medios || [];
  const tend = g.tendencias_cubren || [];
  if (!arts.length) return "";

  const artK = arts.find(a => MEDIO_TENDENCIA[a.medio] === "K");
  const artL = arts.find(a => MEDIO_TENDENCIA[a.medio] === "L");
  const artC = arts.find(a => MEDIO_TENDENCIA[a.medio] === "C");

  let framingHTML = "";
  if (artK && artL) {
    framingHTML = `<div class="framing-grid">${framingBox(artK)}${framingBox(artL)}</div>`;
  } else if (artK && artC) {
    framingHTML = `<div class="framing-grid">${framingBox(artK)}${framingBox(artC)}</div>`;
  } else if (artL && artC) {
    framingHTML = `<div class="framing-grid">${framingBox(artC)}${framingBox(artL)}</div>`;
  } else {
    const art = arts[0];
    if (!art) return "";
    const imgSrc = art.imagen ? `https://images.weserv.nl/?url=${encodeURIComponent(art.imagen)}&w=800&h=200&fit=cover` : "";
    const img = imgSrc ? `<img class="framing-img" src="${imgSrc}" alt="" style="width:100%" onerror="this.style.display='none'">` : "";
    const link = art.link ? `<a href="${art.link}" target="_blank" class="framing-link">Leer en ${art.medio} →</a>` : "";
    const color = medioColor(art.medio);
    framingHTML = `${img}<div class="framing-body"><div class="framing-medio" style="color:${color}">${art.medio}</div><div class="framing-title">${art.titulo}</div>${link}</div>`;
  }

  const allTitlesHTML = arts.map(a => {
    const color = medioColor(a.medio);
    const title = a.link ? `<a href="${a.link}" target="_blank" class="title-text">${a.titulo}</a>` : `<span class="title-text">${a.titulo}</span>`;
    return `<div class="title-row"><span class="title-medio" style="color:${color}">${a.medio}</span>${title}</div>`;
  }).join("");

  const chipsHTML = medios.map(m => {
    const art = arts.find(a => a.medio === m);
    const color = medioColor(m);
    return art && art.link
      ? `<a href="${art.link}" target="_blank" class="chip" style="border-color:${color}20;color:${color}">${m}</a>`
      : `<span class="chip" style="border-color:${color}20;color:${color}">${m}</span>`;
  }).join("");

  const ausentesHTML = (blind && blind.length > 0)
    ? `<span class="chip chip-ausente">👁 Ausente en: ${blind.map(b => b.length <= 1 ? ({K: "medios kirchneristas", C: "medios del centro", L: "medios liberales"}[b] || b) : b).join(", ")}</span>`
    : "";

  const dataAttrs = `data-tendencias="${tend.join(",")}" data-multi="${medios.length>1}" data-ausente="${blind.length>0 && medios.length>1}"`;

  return `
    <div class="story-card" ${dataAttrs}>
      ${framingHTML}
      <div class="card-footer">
        ${chipsHTML}
        ${ausentesHTML}
        ${arts.length > 1 ? `<button class="expand-btn" onclick="var d=this.parentElement.nextElementSibling;d.classList.toggle('open');this.textContent=d.classList.contains('open')?'▲ Ocultar':'▼ Ver todos los títulos (${arts.length})'">▼ Ver todos los títulos (${arts.length})</button>` : ""}
      </div>
      <div class="all-titles">${allTitlesHTML}</div>
    </div>`;
}

function renderSingleRow(g) {
  const art = (g.articulos || [])[0];
  if (!art) return "";
  const tend = g.tendencias_cubren || [];
  const medios = g.medios || [];
  const link = art.link ? `<a href="${art.link}" target="_blank" class="single-link">Leer →</a>` : "";
  const color = medioColor(art.medio);
  const chips = medios.map(m => {
    const c = medioColor(m);
    return `<span class="chip" style="border-color:${c}20;color:${c}">${m}</span>`;
  }).join("");
  return `
    <div class="single-card" data-tendencias="${tend.join(",")}" data-multi="${medios.length>1}" data-ausente="false">
      <div class="single-title">${art.titulo}</div>
      <div class="single-meta">${chips}${link}</div>
    </div>`;
}

function mostrarPagina(id, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + id).classList.add("active");
  btn.classList.add("active");
}

function filtrar(tipo, btn) {
  document.querySelectorAll("#page-todas .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const cards = document.querySelectorAll("#cards-todas [data-tendencias]");
  let visible = 0;
  cards.forEach(card => {
    const esMulti = card.dataset.multi === "true";
    const tieneAusente = card.dataset.ausente === "true";
    let mostrar = tipo === "todos" ? true : tipo === "multi" ? esMulti : tipo === "ausente" ? tieneAusente : true;
    card.classList.toggle("hidden", !mostrar);
    if (mostrar) visible++;
  });
  document.getElementById("no-results").classList.toggle("hidden", visible > 0);
}

function setupSearch(grupos) {
  const input = document.getElementById("search-input");
  const dropdown = document.getElementById("search-dropdown");
  input.addEventListener("input", () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 2) { dropdown.classList.remove("visible"); return; }
    const matches = [];
    for (const g of grupos) {
      for (const art of (g.articulos || [])) {
        if (art.titulo.toLowerCase().includes(q)) {
          matches.push({ art, g });
          if (matches.length >= 8) break;
        }
      }
      if (matches.length >= 8) break;
    }
    if (matches.length === 0) {
      dropdown.innerHTML = `<div class="search-empty">Sin resultados para "${input.value}"</div>`;
    } else {
      dropdown.innerHTML = matches.map(({ art, g }) => `
        <div class="search-item" onclick="irANoticia(${grupos.indexOf(g)})">
          <div class="search-item-title">${art.titulo}</div>
          <div class="search-item-meta">${art.medio} · ${g.medios.length} medio${g.medios.length !== 1 ? 's' : ''}</div>
        </div>`).join("");
    }
    dropdown.classList.add("visible");
  });
  document.addEventListener("click", e => {
    if (!e.target.closest(".search-wrap")) dropdown.classList.remove("visible");
  });
}

function irANoticia(idx) {
  document.getElementById("search-input").value = "";
  document.getElementById("search-dropdown").classList.remove("visible");
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-todas").classList.add("active");
  document.querySelectorAll(".nav-btn")[1].classList.add("active");
  setTimeout(() => {
    const cards = document.querySelectorAll("#cards-todas .story-card, #cards-todas .single-card");
    const card = cards[idx];
    if (card) {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      card.style.outline = "2px solid #1a1a1a";
      setTimeout(() => card.style.outline = "", 2000);
    }
  }, 50);
}

async function cargarDatos() {
  try {
    const r = await fetch("grupos.json");
    const grupos = await r.json();
    todosGrupos = grupos;

    const conScore = grupos.map(g => ({ g, score: relevancia(g) }));
    conScore.sort((a, b) => b.score - a.score);

    let portada = conScore.filter(x => x.score >= 8 && x.g.cantidad_articulos > 1).slice(0, 12).map(x => x.g);
    if (portada.length < 8) portada = conScore.filter(x => x.g.cantidad_articulos > 1).slice(0, 15).map(x => x.g);

    const multi = grupos.filter(g => g.cantidad_articulos > 1).length;
    const conAusente = grupos.filter(g => (g.blind_spot||[]).length > 0 && g.cantidad_articulos > 1).length;
    document.getElementById("stats-bar").innerHTML = `
      <div class="stat-card"><div class="num">${multi}</div><div class="lbl">Noticias comparadas</div></div>
      <div class="stat-card"><div class="num">${conAusente}</div><div class="lbl">Con ausencias destacadas</div></div>
    `;

    // Agrupar portada por tema
    const TEMAS_ORDEN = ["Política", "Economía", "Economía Internacional", "Judicial", "Seguridad", "Sociedad", "Cultura", "Deportes", "General"];
    const porTema = {};
    for (const g of portada.filter(g => g.tema !== "Descartar")) {
      const tema = g.tema || "General";
      if (!porTema[tema]) porTema[tema] = [];
      porTema[tema].push(g);
    }
    let portadaHTML = "";
    for (const tema of TEMAS_ORDEN) {
      if (!porTema[tema] || porTema[tema].length === 0) continue;
      portadaHTML += `<div class="section-header"><span class="section-name">${tema}</span><div class="section-line"></div></div><div class="cards-grid">${porTema[tema].map(g => renderCard(g)).join("")}</div>`;
    }
    document.getElementById("cards-portada").innerHTML = portadaHTML || `<div class="no-results">No hay noticias relevantes por ahora.</div>`;

    document.getElementById("cards-todas").innerHTML = conScore.filter(({g}) => g.cantidad_articulos > 1 && g.tema !== "Descartar").map(({g}) => renderCard(g)).join("");

    setupSearch(grupos);

  } catch(e) {
    document.getElementById("cards-portada").innerHTML =
      `<div class="no-results">No se pudo cargar grupos.json. Corré primero scraper.py y agrupar.py.</div>`;
  }
}

cargarDatos();
</script>
</body>
</html>

name: Actualizar noticias

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install feedparser requests beautifulsoup4 sentence-transformers scikit-learn

      - name: Correr scraper
        run: python scraper.py

      - name: Correr agrupador
        run: python agrupar.py

      - name: Correr enriquecedor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python enriquecer.py

      - name: Subir cambios
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add grupos.json
          git diff --staged --quiet || git commit -m "actualizar noticias $(date '+%Y-%m-%d %H:%M')"
          git push
